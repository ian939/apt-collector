name: 매물 수집

on:
  schedule:
    - cron: '0 1 * * *'    # 매일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:         # 수동 실행 허용

jobs:
  collect:
    runs-on: self-hosted
    permissions:
      contents: write        # 로그 파일 커밋을 위해 필요

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          clean: false    # listings.csv 등 gitignore 파일 보존

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium

      - name: 매물 수집 실행
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: 결과 커밋 및 푸시
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/logs/ output/listings.csv
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) { git commit -m "data: $(Get-Date -Format 'yyyy-MM-dd') 수집 완료" }
          git push
